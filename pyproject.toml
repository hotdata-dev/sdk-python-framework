[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hotdata-runtime"
version = "0.1.1"
description = "Workspace/session runtime primitives for Hotdata integrations"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "hotdata>=0.1.1",
  "pandas>=2.0",
]

[dependency-groups]
dev = [
  "packaging>=23",
  "pytest>=8.0",
]

[tool.uv]
default-groups = ["dev"]

# Resolve hotdata from a sibling checkout until v0.1.1 is on PyPI.
[tool.uv.sources]
hotdata = { path = "../sdk-python", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["hotdata_runtime"]

[tool.pytest.ini_options]
testpaths = ["tests"]
