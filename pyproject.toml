[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[project]
name = "hotdata-runtime"
version = "0.1.0"
description = "Workspace/session runtime primitives for Hotdata integrations"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "hotdata @ git+https://github.com/hotdata-dev/sdk-python.git",
  "pandas>=2.0",
]

[dependency-groups]
dev = [
  "packaging>=23",
  "pytest>=8.0",
]

[tool.uv]
default-groups = ["dev"]

[tool.uv.sources]
hotdata = { path = "../sdk-python", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["hotdata_runtime"]

[tool.pytest.ini_options]
testpaths = ["tests"]
